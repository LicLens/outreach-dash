<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>365TUNE Outreach</title>
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.5/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
  <style>
    * { -webkit-font-smoothing: antialiased; }
    .slide-drawer { transform: translateX(100%); transition: transform 0.3s cubic-bezier(.4,0,.2,1); }
    .slide-drawer.open { transform: translateX(0); }
    .nav-item { border-left: 3px solid transparent; }
    .nav-item.active { background: rgba(37,99,235,.1); color: #3b82f6; border-left-color: #2563eb; }
    pre { white-space: pre-wrap; word-break: break-word; font-family: inherit; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 99px; }
    .funnel-bar { transition: width 0.5s cubic-bezier(.4,0,.2,1); }
    .stat-card { transition: box-shadow 0.15s, transform 0.15s; }
    .stat-card:hover { box-shadow: 0 4px 20px rgba(37,99,235,.1); transform: translateY(-1px); }
    input:focus, select:focus, textarea:focus { outline: none; box-shadow: 0 0 0 3px rgba(37,99,235,.15); border-color: #2563eb !important; }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>
  <script type="text/babel">
  const { useState, useEffect, useRef, useCallback, useMemo } = React;

  // ── Constants ─────────────────────────────────────────────────────────────
  const OWNER = 'LicLens';
  const REPO  = '365tune-outreach';
  const PER_PAGE = 50;
  const LS = { PASS: '365tune_pass_hash', SETTINGS: '365tune_settings' };

  const ANGLE_COLORS = {
    A: 'bg-sky-100 text-sky-700 ring-1 ring-sky-200',
    B: 'bg-amber-100 text-amber-700 ring-1 ring-amber-200',
    C: 'bg-rose-100 text-rose-700 ring-1 ring-rose-200',
  };
  const ANGLE_LABELS_MAP = {
    it_leader: { A:'License Cost',   B:'EA Trigger',     C:'Tier Mismatch' },
    ciso:      { A:'CIS Benchmark',  B:'Identity Risk',  C:'Legacy Auth'   },
    finops:    { A:'Waste in $',     B:'EA Leverage',    C:'Dept Visibility' },
    msp:       { A:'Multi-tenant',   B:'Client Compliance', C:'GDAP'       },
  };
  function angleLabel(icp, angle) {
    return ANGLE_LABELS_MAP[icp]?.[angle] || angle;
  }

  const ICP_COLORS = {
    it_leader: 'bg-blue-100 text-blue-700 ring-1 ring-blue-200',
    ciso:      'bg-red-100 text-red-700 ring-1 ring-red-200',
    finops:    'bg-emerald-100 text-emerald-700 ring-1 ring-emerald-200',
    msp:       'bg-purple-100 text-purple-700 ring-1 ring-purple-200',
  };
  const ICP_BAR_COLORS = {
    it_leader: 'bg-blue-500',
    ciso:      'bg-red-500',
    finops:    'bg-emerald-500',
    msp:       'bg-purple-500',
  };
  const ICP_LABELS = { it_leader:'IT Leader', ciso:'CISO', finops:'FinOps', msp:'MSP' };

  const PROSPECT_STATUSES = ['pending','researched','emails_ready','active','completed','replied','unsubscribed','error'];
  const STATUS_COLORS = {
    pending:      'bg-gray-100 text-gray-600',
    researched:   'bg-yellow-100 text-yellow-700 ring-1 ring-yellow-200',
    emails_ready: 'bg-blue-100 text-blue-700 ring-1 ring-blue-200',
    active:       'bg-indigo-100 text-indigo-700 ring-1 ring-indigo-200',
    completed:    'bg-green-100 text-green-700 ring-1 ring-green-200',
    replied:      'bg-emerald-100 text-emerald-700 ring-1 ring-emerald-200',
    unsubscribed: 'bg-orange-100 text-orange-700',
    error:        'bg-red-100 text-red-700 ring-1 ring-red-200',
  };
  const STATUS_LABELS = {
    pending:'Pending', researched:'Researched', emails_ready:'Emails Ready',
    active:'Active', completed:'Completed', replied:'Replied',
    unsubscribed:'Unsubscribed', error:'Error',
  };

  // ── Utilities ─────────────────────────────────────────────────────────────
  async function sha256(msg) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }
  function fmtDate(d) {
    if (!d) return '—';
    try { return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
    catch { return d; }
  }
  function fmtNum(n) { return n == null ? '—' : Number(n).toLocaleString(); }
  function pct(num, den) { return den > 0 ? Math.round((num/den)*100) : 0; }

  function buildBlobUrl(sasUrl) {
    if (!sasUrl) return null;
    const idx = sasUrl.indexOf('?');
    return idx === -1 ? sasUrl + '/campaign_app.db' : sasUrl.slice(0,idx) + '/campaign_app.db' + sasUrl.slice(idx);
  }
  function loadSettings() {
    try { return JSON.parse(localStorage.getItem(LS.SETTINGS) || '{}'); } catch { return {}; }
  }
  function saveSettings(s) { localStorage.setItem(LS.SETTINGS, JSON.stringify(s)); }

  // ── GitHub API ────────────────────────────────────────────────────────────
  async function ghFetch(pat, path, method='GET', body=null) {
    const res = await fetch(`https://api.github.com${path}`, {
      method,
      headers: {
        Authorization: `Bearer ${pat}`,
        Accept: 'application/vnd.github+json',
        'Content-Type': 'application/json',
        'X-GitHub-Api-Version': '2022-11-28',
      },
      body: body ? JSON.stringify(body) : null,
    });
    if (method==='DELETE' || res.status===204) return true;
    if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.message||`GitHub ${res.status}`); }
    return res.json();
  }
  async function triggerWorkflow(pat, workflow, inputs={}) {
    return ghFetch(pat, `/repos/${OWNER}/${REPO}/actions/workflows/${workflow}/dispatches`, 'POST', { ref:'main', inputs });
  }
  async function listRuns(pat, workflow) {
    const d = await ghFetch(pat, `/repos/${OWNER}/${REPO}/actions/runs?workflow_id=${workflow}&per_page=6`);
    return d.workflow_runs || [];
  }
  async function getFileContent(pat, path) {
    try {
      const d = await ghFetch(pat, `/repos/${OWNER}/${REPO}/contents/${path}`);
      return { content: JSON.parse(atob(d.content.replace(/\n/g,''))), sha: d.sha };
    } catch { return { content: null, sha: null }; }
  }
  async function setFileContent(pat, path, content, sha, message) {
    return ghFetch(pat, `/repos/${OWNER}/${REPO}/contents/${path}`, 'PUT', {
      message: message || `Update ${path}`,
      content: btoa(unescape(encodeURIComponent(JSON.stringify(content, null, 2)))),
      ...(sha ? { sha } : {}),
    });
  }

  // ── SQL Helpers ───────────────────────────────────────────────────────────
  function dbRun(db, sql, params=[]) {
    if (!db) return [];
    try {
      const stmt = db.prepare(sql); stmt.bind(params);
      const rows = [];
      while (stmt.step()) rows.push(stmt.getAsObject());
      stmt.free(); return rows;
    } catch(e) { console.error('SQL:', e.message, '\n', sql); return []; }
  }
  function dbOne(db, sql, params=[]) { return dbRun(db, sql, params)[0] || null; }

  function getStats(db) {
    const statusCounts = {};
    PROSPECT_STATUSES.forEach(s => {
      const r = dbOne(db, `SELECT COUNT(*) as c FROM prospects WHERE status = ?`, [s]);
      statusCounts[s] = r?.c || 0;
    });
    const total = dbOne(db, `SELECT COUNT(*) as c FROM prospects`)?.c || 0;
    const emailStats = dbOne(db,`SELECT
      SUM(CASE WHEN status='sent'      THEN 1 ELSE 0 END) as sent,
      SUM(CASE WHEN status='scheduled' THEN 1 ELSE 0 END) as scheduled,
      SUM(CASE WHEN status='failed'    THEN 1 ELSE 0 END) as failed
      FROM email_sends`) || {};
    const sentToday = dbOne(db,
      `SELECT COUNT(*) as c FROM email_sends WHERE status='sent' AND DATE(sent_at)=DATE('now')`
    )?.c || 0;
    const icpCounts = dbRun(db,
      `SELECT COALESCE(icp,'it_leader') as icp, COUNT(*) as cnt FROM prospects GROUP BY icp ORDER BY cnt DESC`
    );
    return { total, ...statusCounts, ...emailStats, sentToday, icpCounts };
  }

  function getIcpFunnel(db) {
    const icps = ['it_leader','ciso','finops','msp'];
    return icps.map(icp => {
      const r = dbOne(db,`
        SELECT
          COUNT(*) as total,
          SUM(CASE WHEN status='pending'      THEN 1 ELSE 0 END) as pending,
          SUM(CASE WHEN status='researched'   THEN 1 ELSE 0 END) as researched,
          SUM(CASE WHEN status='emails_ready' THEN 1 ELSE 0 END) as emails_ready,
          SUM(CASE WHEN status='active'       THEN 1 ELSE 0 END) as active,
          SUM(CASE WHEN status='completed'    THEN 1 ELSE 0 END) as completed,
          SUM(CASE WHEN status='replied'      THEN 1 ELSE 0 END) as replied,
          SUM(CASE WHEN status='error'        THEN 1 ELSE 0 END) as errors
        FROM prospects WHERE COALESCE(icp,'it_leader') = ?`, [icp]) || {};
      const emailsSent = dbOne(db,`
        SELECT COUNT(*) as c FROM email_sends es
        JOIN prospects p ON p.id = es.prospect_id
        WHERE es.status='sent' AND COALESCE(p.icp,'it_leader')=?`, [icp])?.c || 0;
      return { icp, label: ICP_LABELS[icp], ...r, emailsSent };
    }).filter(r => r.total > 0);
  }

  function getDailySends(db) {
    return dbRun(db,`SELECT DATE(sent_at) as date, COUNT(*) as count,
      SUM(CASE WHEN COALESCE(p.icp,'it_leader')='msp' THEN 1 ELSE 0 END) as msp_count,
      SUM(CASE WHEN COALESCE(p.icp,'it_leader')='it_leader' THEN 1 ELSE 0 END) as it_count,
      SUM(CASE WHEN COALESCE(p.icp,'it_leader')='ciso' THEN 1 ELSE 0 END) as ciso_count,
      SUM(CASE WHEN COALESCE(p.icp,'it_leader')='finops' THEN 1 ELSE 0 END) as finops_count
      FROM email_sends es JOIN prospects p ON p.id=es.prospect_id
      WHERE es.status='sent' AND es.sent_at IS NOT NULL
      GROUP BY DATE(sent_at) ORDER BY date DESC LIMIT 30`).reverse();
  }

  function getAngleBreakdown(db) {
    return dbRun(db, `
      SELECT
        COALESCE(angle,'A') as angle,
        COALESCE(icp,'it_leader') as icp,
        COUNT(*) as total,
        SUM(CASE WHEN status='active'    THEN 1 ELSE 0 END) as active,
        SUM(CASE WHEN status='completed' THEN 1 ELSE 0 END) as completed,
        SUM(CASE WHEN status='replied'   THEN 1 ELSE 0 END) as replied
      FROM prospects
      GROUP BY COALESCE(angle,'A'), COALESCE(icp,'it_leader')
      ORDER BY icp, angle
    `);
  }

  function getProspects(db, page, search, icpF, statusF, angleF='') {
    const like = `%${search}%`;
    const w = `WHERE (? = '' OR p.first_name LIKE ? OR p.last_name LIKE ? OR p.company LIKE ? OR p.email LIKE ?)
      AND (? = '' OR COALESCE(p.icp,'it_leader') = ?)
      AND (? = '' OR p.status = ?)
      AND (? = '' OR COALESCE(p.angle,'A') = ?)`;
    const params = [search,like,like,like,like, icpF,icpF, statusF,statusF, angleF,angleF];
    const cnt = dbOne(db,`SELECT COUNT(DISTINCT p.id) as total FROM prospects p ${w}`, params);
    const rows = dbRun(db,`SELECT p.id, p.first_name, p.last_name, p.title, p.company, p.email,
      p.employees, COALESCE(p.icp,'it_leader') as icp, COALESCE(p.angle,'A') as angle,
      p.status, p.error_msg, p.research_brief, p.email_sequence,
      COUNT(CASE WHEN es.status='sent' THEN 1 END) as emails_sent,
      MAX(CASE WHEN es.status='sent' THEN es.sent_at END) as last_sent_at,
      MIN(CASE WHEN es.status='scheduled' THEN es.scheduled_date END) as next_send
      FROM prospects p LEFT JOIN email_sends es ON es.prospect_id=p.id
      ${w} GROUP BY p.id ORDER BY p.id LIMIT ? OFFSET ?`,
      [...params, PER_PAGE, page*PER_PAGE]);
    return { total: cnt?.total||0, rows };
  }

  // ── Shared Components ─────────────────────────────────────────────────────
  function Badge({ label, cls }) {
    return <span className={`inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium ${cls}`}>{label}</span>;
  }
  function EmptyState({ icon, title, sub }) {
    return (
      <div className="flex flex-col items-center justify-center h-64 text-gray-400">
        <div className="text-5xl mb-3 opacity-60">{icon}</div>
        <div className="text-sm font-semibold text-gray-500">{title}</div>
        {sub && <div className="text-xs mt-1 text-gray-400">{sub}</div>}
      </div>
    );
  }
  function SectionLabel({ children }) {
    return <p className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3">{children}</p>;
  }
  function Card({ children, className='' }) {
    return <div className={`bg-white rounded-2xl border border-gray-100 shadow-sm ${className}`}>{children}</div>;
  }

  // ── Login ─────────────────────────────────────────────────────────────────
  function LoginScreen({ onLogin }) {
    const [pw, setPw] = useState('');
    const [err, setErr] = useState('');
    const hasPass = !!localStorage.getItem(LS.PASS);

    async function handle(e) {
      e.preventDefault();
      if (!hasPass && pw.length < 6) { setErr('Min 6 characters'); return; }
      const hash = await sha256(pw);
      if (!hasPass) { localStorage.setItem(LS.PASS, hash); onLogin(); return; }
      if (hash === localStorage.getItem(LS.PASS)) { onLogin(); }
      else { setErr('Incorrect password'); }
    }

    return (
      <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-900 via-blue-950 to-slate-900">
        <div className="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-sm">
          <div className="text-center mb-8">
            <div className="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-blue-600 mb-4">
              <span className="text-white text-xl font-bold">3</span>
            </div>
            <div className="text-2xl font-bold text-gray-900 tracking-tight">365TUNE</div>
            <div className="text-sm text-gray-400 mt-1">Outreach Dashboard</div>
          </div>
          <form onSubmit={handle} className="space-y-4">
            <div>
              <label className="text-xs font-semibold text-gray-500 block mb-1.5 uppercase tracking-wide">
                {hasPass ? 'Password' : 'Set a dashboard password'}
              </label>
              <input type="password" value={pw} onChange={e=>{setPw(e.target.value);setErr('');}}
                className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm"
                placeholder={hasPass ? 'Enter password' : 'Min 6 characters'} autoFocus />
            </div>
            {err && <p className="text-red-500 text-xs font-medium">{err}</p>}
            <button type="submit"
              className="w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-semibold py-2.5 rounded-xl text-sm transition-colors">
              {hasPass ? 'Sign In →' : 'Get Started →'}
            </button>
          </form>
        </div>
      </div>
    );
  }

  // ── Sidebar ───────────────────────────────────────────────────────────────
  function NavItem({ icon, label, active, onClick }) {
    return (
      <button onClick={onClick}
        className={`nav-item flex items-center gap-3 w-full px-4 py-2.5 text-sm font-medium transition-all text-left mb-0.5 ${
          active ? 'active' : 'text-slate-400 hover:bg-white/5 hover:text-slate-200'
        }`}>
        <span className="text-base leading-none">{icon}</span>
        <span>{label}</span>
      </button>
    );
  }
  function Sidebar({ page, setPage, dbLoaded, onLoad, loading, onLogout }) {
    return (
      <div className="w-56 min-h-screen bg-slate-900 flex flex-col shrink-0 border-r border-slate-800">
        <div className="px-5 py-5 border-b border-slate-800">
          <div className="flex items-center gap-2.5">
            <div className="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center shrink-0">
              <span className="text-white text-xs font-bold">365</span>
            </div>
            <div>
              <div className="text-sm font-bold text-white tracking-tight leading-none">365TUNE</div>
              <div className="text-xs text-slate-500 mt-0.5">Outreach</div>
            </div>
          </div>
        </div>
        <nav className="flex-1 py-3 pr-2">
          <NavItem icon="📊" label="Dashboard"  active={page==='dashboard'} onClick={()=>setPage('dashboard')} />
          <NavItem icon="👥" label="Prospects"  active={page==='prospects'} onClick={()=>setPage('prospects')} />
          <NavItem icon="⚡" label="Tasks"      active={page==='tasks'}     onClick={()=>setPage('tasks')} />
          <NavItem icon="⚙️" label="Settings"  active={page==='settings'}  onClick={()=>setPage('settings')} />
        </nav>
        <div className="p-3 border-t border-slate-800 space-y-2">
          <button onClick={onLoad} disabled={loading}
            className={`w-full flex items-center justify-center gap-2 py-2.5 rounded-xl text-xs font-semibold transition-colors
              ${loading ? 'bg-slate-800 text-slate-500 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-500 text-white'}`}>
            {loading ? '⏳ Loading…' : dbLoaded ? '🔄 Refresh Data' : '📥 Load Data'}
          </button>
          {dbLoaded && <p className="text-center text-xs text-emerald-400 font-medium">✓ Data loaded</p>}
          <button onClick={onLogout} className="w-full text-xs text-slate-600 hover:text-slate-400 transition py-1">
            Sign out
          </button>
        </div>
      </div>
    );
  }

  // ── Dashboard Components ──────────────────────────────────────────────────
  const STAT_ACCENT = {
    blue:    'border-t-blue-500',
    green:   'border-t-green-500',
    orange:  'border-t-orange-400',
    red:     'border-t-red-500',
    purple:  'border-t-purple-500',
    emerald: 'border-t-emerald-500',
    gray:    'border-t-gray-300',
    yellow:  'border-t-yellow-400',
    indigo:  'border-t-indigo-500',
  };
  function StatCard({ label, value, color='blue', sub='' }) {
    return (
      <div className={`stat-card bg-white rounded-2xl border border-gray-100 border-t-4 p-4 ${STAT_ACCENT[color]||STAT_ACCENT.blue}`}>
        <div className="text-3xl font-bold text-gray-900 tabular-nums leading-none">{fmtNum(value)}</div>
        <div className="text-xs font-semibold text-gray-400 mt-2 uppercase tracking-wide">{label}</div>
        {sub && <div className="text-xs text-blue-600 font-semibold mt-1">{sub}</div>}
      </div>
    );
  }

  function StackedBarChart({ data }) {
    const ref = useRef(); const chart = useRef();
    useEffect(() => {
      if (!ref.current || !data?.length) return;
      chart.current?.destroy();
      chart.current = new Chart(ref.current, {
        type: 'bar',
        data: {
          labels: data.map(d => {
            try { return new Date(d.date+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
            catch { return d.date; }
          }),
          datasets: [
            { label:'IT Leader', data: data.map(d=>d.it_count||0),     backgroundColor:'rgba(37,99,235,0.85)',   borderRadius:{ topLeft:3, topRight:3 } },
            { label:'MSP',       data: data.map(d=>d.msp_count||0),    backgroundColor:'rgba(124,58,237,0.85)',  borderRadius:0 },
            { label:'CISO',      data: data.map(d=>d.ciso_count||0),   backgroundColor:'rgba(220,38,38,0.85)',   borderRadius:0 },
            { label:'FinOps',    data: data.map(d=>d.finops_count||0), backgroundColor:'rgba(16,185,129,0.85)',  borderRadius:0 },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          plugins: {
            legend: { position:'bottom', labels:{ font:{size:11, weight:'500'}, boxWidth:10, padding:16, color:'#64748b' } },
            tooltip: { mode:'index', intersect:false },
          },
          scales: {
            x: { stacked:true, grid:{ display:false }, ticks:{ color:'#94a3b8', font:{size:10} }, border:{ display:false } },
            y: { stacked:true, beginAtZero:true, grid:{ color:'rgba(0,0,0,0.04)', drawBorder:false }, ticks:{ color:'#94a3b8', font:{size:10} }, border:{ display:false } },
          },
        },
      });
      return () => chart.current?.destroy();
    }, [data]);
    if (!data?.length) return <div className="text-gray-400 text-sm text-center py-10">No send history yet</div>;
    return <div className="relative"><canvas ref={ref} /></div>;
  }

  function IcpFunnelTable({ funnel }) {
    if (!funnel?.length) return null;
    return (
      <div className="overflow-x-auto">
        <table className="w-full text-sm">
          <thead>
            <tr className="text-left text-xs font-bold text-gray-400 uppercase tracking-widest">
              <th className="pb-3 pr-4">ICP</th>
              <th className="pb-3 px-3 text-right">Total</th>
              <th className="pb-3 px-3 text-right">Pending</th>
              <th className="pb-3 px-3 text-right">Active</th>
              <th className="pb-3 px-3 text-right">Done</th>
              <th className="pb-3 px-3 text-right">Replied</th>
              <th className="pb-3 px-3 text-right">Errors</th>
              <th className="pb-3 px-3 text-right">Emails</th>
              <th className="pb-3 pl-3">Progress</th>
            </tr>
          </thead>
          <tbody>
            {funnel.map(r => {
              const done = (r.completed||0) + (r.replied||0);
              const progress = pct(done + (r.active||0), r.total);
              return (
                <tr key={r.icp} className="border-t border-gray-50 hover:bg-blue-50/30 transition-colors">
                  <td className="py-3 pr-4">
                    <Badge label={r.label} cls={ICP_COLORS[r.icp]||'bg-gray-100 text-gray-700'} />
                  </td>
                  <td className="py-3 px-3 text-right font-bold text-gray-800">{fmtNum(r.total)}</td>
                  <td className="py-3 px-3 text-right text-gray-400">{fmtNum(r.pending)}</td>
                  <td className="py-3 px-3 text-right text-blue-600 font-semibold">{fmtNum(r.active)}</td>
                  <td className="py-3 px-3 text-right text-green-600 font-semibold">{fmtNum(r.completed)}</td>
                  <td className="py-3 px-3 text-right text-emerald-600 font-semibold">{fmtNum(r.replied)}</td>
                  <td className="py-3 px-3 text-right text-red-400">{r.errors > 0 ? fmtNum(r.errors) : <span className="text-gray-300">—</span>}</td>
                  <td className="py-3 px-3 text-right text-gray-700 font-medium">{fmtNum(r.emailsSent)}</td>
                  <td className="py-3 pl-3">
                    <div className="flex items-center gap-2 min-w-[110px]">

  // ── Tasks ─────────────────────────────────────────────────────────────────
  function WorkflowCard({ icon, title, desc, workflow, fields=[], pat, accentColor='blue' }) {
    const [inputs, setInputs] = useState(()=>Object.fromEntries((fields||[]).map(f=>[f.name,f.default||''])));
    const [loading, setLoading] = useState(false);
    const [runs, setRuns] = useState([]);
    const [msg, setMsg] = useState('');

    const loadRuns = useCallback(async()=>{
      if (!pat) return;
      try { setRuns(await listRuns(pat, workflow)); } catch {}
    },[pat, workflow]);

    useEffect(()=>{ loadRuns(); },[loadRuns]);

    async function run() {
      if (!pat) { setMsg('❌ Add GitHub PAT in Settings'); return; }
      setLoading(true); setMsg('');
      try {
        await triggerWorkflow(pat, workflow, inputs);
        setMsg('✅ Triggered! Refreshing in 4s…');
        setTimeout(loadRuns, 4000);
      } catch(e) { setMsg(`❌ ${e.message}`); }
      finally { setLoading(false); }
    }

    const icons = { completed:'✅', failure:'❌', in_progress:'⏳', queued:'🕐', cancelled:'⛔', skipped:'⏭️' };
    const btnCls = {
      blue:   'bg-blue-600 hover:bg-blue-700 active:bg-blue-800',
      purple: 'bg-purple-600 hover:bg-purple-700 active:bg-purple-800',
    };

    const inputCls = "w-full border border-gray-200 rounded-xl px-3 py-2 text-sm";

    return (
      <Card className="p-5 flex flex-col">
        <div className="flex gap-3 mb-4">
          <span className="text-2xl leading-none">{icon}</span>
          <div>
            <div className="font-bold text-gray-800 text-sm">{title}</div>
            <div className="text-xs text-gray-400 mt-0.5">{desc}</div>
          </div>
        </div>
        {fields.map(f=>(
          <div key={f.name} className="mb-2.5">
            <label className="text-xs font-semibold text-gray-400 uppercase tracking-wide block mb-1">{f.label}</label>
            {f.type==='select'
              ? <select value={inputs[f.name]||''} onChange={e=>setInputs(i=>({...i,[f.name]:e.target.value}))}
                  className={inputCls}>
                  {f.options.map(o=><option key={o} value={o}>{o}</option>)}
                </select>
              : <input type={f.inputType||'text'} value={inputs[f.name]||''} onChange={e=>setInputs(i=>({...i,[f.name]:e.target.value}))}
                  placeholder={f.placeholder}
                  className={inputCls} />
            }
          </div>
        ))}
        <button onClick={run} disabled={loading}
          className={`mt-auto w-full ${btnCls[accentColor]||btnCls.blue} disabled:opacity-50 text-white text-sm font-semibold py-2.5 rounded-xl transition-colors mt-3`}>
          {loading ? '⏳ Triggering…' : '▶ Run Now'}
        </button>
        {msg && <div className="mt-2 text-xs text-gray-500 font-medium">{msg}</div>}
        {runs.length>0 && (
          <div className="mt-4 pt-4 border-t border-gray-50 space-y-1.5">
            <div className="text-xs font-bold text-gray-400 uppercase tracking-wide mb-2">Recent runs</div>
            {runs.slice(0,4).map(r=>(
              <div key={r.id} className="flex justify-between text-xs">
                <span className="text-gray-600">{icons[r.conclusion||r.status]||'🔵'} {r.conclusion||r.status}</span>
                <span className="text-gray-400">{fmtDate(r.created_at)}</span>
              </div>
            ))}
          </div>
        )}
      </Card>
    );
  }

            <WorkflowCard icon="🟣 🔬" title="Process MSP Prospects" desc="Research + generate email sequences for MSPs"
              workflow="msp-process.yml" pat={pat} accentColor="purple"
              fields={[{name:'batch',label:'Batch size per chunk',inputType:'number',default:'10',placeholder:'e.g. 10'}]} />
          </div>
        </div>

        <div>
          <SectionLabel>Maintenance</SectionLabel>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            <WorkflowCard icon="🔁" title="Retry Failed" desc="Retry prospects with failed research or email gen"
              workflow="retry.yml" pat={pat} accentColor="blue"
              fields={[
                {name:'mode',label:'Mode',type:'select',default:'all',options:['all','research','emailgen']},
                {name:'batch',label:'Batch size',inputType:'number',default:'100',placeholder:'100'},
                {name:'filter',label:'Error filter (optional)',placeholder:'e.g. anthropic'},
              ]} />
            <WorkflowCard icon="📊" title="Update Dashboard" desc="Refresh GitHub Pages with latest data"
              workflow="dashboard.yml" pat={pat} accentColor="blue" />
          </div>
        </div>
      </div>
    );
  }

  // ── ICP Manager ───────────────────────────────────────────────────────────
  const DEFAULT_ICPS = [
    { id:'it_leader', label:'IT Leader',  keywords:['it director','cto','vp of it','head of it','it manager'],         description:'IT decision makers responsible for M365 licensing' },
    { id:'ciso',      label:'CISO',       keywords:['ciso','chief information security','security director'],            description:'Security leaders focused on compliance and risk' },
    { id:'finops',    label:'FinOps',     keywords:['finops','cloud cost','cost optimization','cloud spend'],            description:'Finance/ops leaders managing cloud costs' },
    { id:'msp',       label:'MSP',        keywords:['msp','managed service','service delivery','channel manager'],       description:'Managed service providers reselling M365' },
  ];
  const BLANK_FORM = { id:'', label:'', keywords:'', description:'', research_prompt:'', email_prompt:'' };

  function ICPManager({ pat }) {
    const [icps, setIcps] = useState(DEFAULT_ICPS);
    const [sha, setSha] = useState(null);
    const [adding, setAdding] = useState(false);
    const [form, setForm] = useState(BLANK_FORM);
    const [saving, setSaving] = useState(false);
    const [msg, setMsg] = useState('');

    useEffect(()=>{
      if (!pat) return;
      getFileContent(pat,'outreach_automation/icp_config.json').then(({content,sha})=>{
        if (content && Array.isArray(content)) { setIcps(content); setSha(sha); }
      });
    },[pat]);

    async function save(updated) {
      if (!pat) { setMsg('❌ GitHub PAT required'); return; }
      setSaving(true); setMsg('');
      try {
        const res = await setFileContent(pat,'outreach_automation/icp_config.json', updated, sha,'Update ICP configuration');
        setIcps(updated);
        if (res?.content?.sha) setSha(res.content.sha);
        setMsg('✅ Saved to GitHub');
        setTimeout(()=>setMsg(''),3000);
      } catch(e) { setMsg(`❌ ${e.message}`); }
      finally { setSaving(false); }
    }

    function add() {
      if (!form.id||!form.label) { setMsg('ID and Label are required'); return; }
      save([...icps,{
        id: form.id.toLowerCase().replace(/\s+/g,'_'),
        label: form.label,
        keywords: form.keywords.split(',').map(k=>k.trim()).filter(Boolean),
        description: form.description,
        research_prompt: form.research_prompt,
        email_prompt: form.email_prompt,
      }]);
      setForm(BLANK_FORM); setAdding(false);
    }

    const inputCls = "w-full border border-gray-200 rounded-xl px-3 py-2 text-sm";

    return (
      <div>
        <div className="flex items-center justify-between mb-5">
          <div>
            <h3 className="font-bold text-gray-800">ICP Management</h3>
            <p className="text-xs text-gray-400 mt-0.5">Saved to <code className="text-blue-600">icp_config.json</code></p>
          </div>
          <button onClick={()=>setAdding(!adding)}
            className="text-sm bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-xl font-semibold transition-colors">
            + Add ICP
          </button>
        </div>
        {msg && <div className="mb-3 text-sm font-medium text-gray-600">{msg}</div>}
        <div className="space-y-2 mb-4">
          {icps.map(icp=>(
            <div key={icp.id} className="flex items-start justify-between bg-gray-50 rounded-xl px-4 py-3 border border-gray-100">
              <div className="min-w-0">
                <div className="flex items-center gap-2">
                  <Badge label={icp.label} cls={ICP_COLORS[icp.id]||'bg-gray-100 text-gray-700'} />
                  <code className="text-xs text-gray-400 bg-white px-1.5 py-0.5 rounded-lg border border-gray-200">{icp.id}</code>
                </div>
                {icp.description && <p className="text-xs text-gray-500 mt-1">{icp.description}</p>}
                {icp.keywords?.length>0 && (
                  <div className="flex flex-wrap gap-1 mt-1.5">
                    {icp.keywords.slice(0,6).map(k=>(
                      <span key={k} className="text-xs bg-white border border-gray-200 text-gray-500 px-1.5 py-0.5 rounded-lg">{k}</span>
                    ))}
                    {icp.keywords.length>6 && <span className="text-xs text-gray-400 font-medium">+{icp.keywords.length-6}</span>}
                  </div>
                )}
              </div>
              <button onClick={()=>{ if(confirm(`Delete "${icp.label}"?`)) save(icps.filter(i=>i.id!==icp.id)); }}
                className="text-xs text-red-400 hover:text-red-600 ml-3 shrink-0 font-semibold transition-colors">Delete</button>
            </div>
          ))}
        </div>
        {adding && (
          <div className="border border-gray-100 rounded-2xl p-5 bg-gray-50/60 space-y-3">
            <h4 className="text-sm font-bold text-gray-700">New ICP</h4>
            <div className="grid grid-cols-2 gap-3">
              {[['ID (snake_case)','id','e.g. it_director'],['Display Label','label','e.g. IT Director']].map(([l,n,p])=>(
                <div key={n}>
                  <label className="text-xs font-semibold text-gray-400 uppercase tracking-wide block mb-1">{l}</label>
                  <input value={form[n]} onChange={e=>setForm(f=>({...f,[n]:e.target.value}))} placeholder={p} className={inputCls} />
                </div>
              ))}
            </div>
            <div>
              <label className="text-xs font-semibold text-gray-400 uppercase tracking-wide block mb-1">Keywords (comma-separated)</label>
              <input value={form.keywords} onChange={e=>setForm(f=>({...f,keywords:e.target.value}))} placeholder="it director, vp of it, head of it" className={inputCls} />
            </div>
            <div>
              <label className="text-xs font-semibold text-gray-400 uppercase tracking-wide block mb-1">Description</label>
              <input value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))} placeholder="Short description" className={inputCls} />
            </div>
            {[['Research Prompt (optional)','research_prompt'],['Email Sequence Prompt (optional)','email_prompt']].map(([l,n])=>(
              <div key={n}>
                <label className="text-xs font-semibold text-gray-400 uppercase tracking-wide block mb-1">{l}</label>
                <textarea value={form[n]} onChange={e=>setForm(f=>({...f,[n]:e.target.value}))} rows={3}
                  className={`${inputCls} resize-none`} />
              </div>
            ))}
            <div className="flex gap-2">
              <button onClick={add} disabled={saving}
                className="bg-blue-600 hover:bg-blue-700 text-white text-sm px-5 py-2.5 rounded-xl font-semibold transition-colors disabled:opacity-50">
                {saving?'Saving…':'Save ICP'}
              </button>
              <button onClick={()=>{setAdding(false);setForm(BLANK_FORM);}}
                className="border border-gray-200 text-gray-600 text-sm px-5 py-2.5 rounded-xl font-semibold hover:bg-white transition-colors">
                Cancel
              </button>
            </div>
          </div>
        )}
      </div>
    );
  }

  // ── Settings ──────────────────────────────────────────────────────────────
  function SettingsPage({ settings, onSave }) {
    const [form, setForm] = useState({ sas_url:'', github_pat:'', ...settings });
    const [saved, setSaved] = useState(false);
    const [newPw, setNewPw] = useState('');
    const [pwMsg, setPwMsg] = useState('');

    const inputCls = "w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm";

    function Field({ label, name, type='text', placeholder='', note='' }) {
      return (
        <div>
          <label className="text-xs font-bold text-gray-500 uppercase tracking-wide block mb-1.5">{label}</label>
          <input type={type} value={form[name]||''} onChange={e=>setForm(f=>({...f,[name]:e.target.value}))}
            placeholder={placeholder} className={inputCls} />
          {note && <p className="text-xs text-gray-400 mt-1">{note}</p>}
        </div>
      );
    }

    function save(e) {
      e.preventDefault(); onSave(form); setSaved(true); setTimeout(()=>setSaved(false),2500);
    }
    async function changePw(e) {
      e.preventDefault();
      if (newPw.length<6) { setPwMsg('Min 6 characters'); return; }
      localStorage.setItem(LS.PASS, await sha256(newPw));
      setNewPw(''); setPwMsg('✅ Password updated'); setTimeout(()=>setPwMsg(''),3000);
    }

    return (
      <div className="max-w-2xl space-y-5">
        <div>
          <h1 className="text-2xl font-bold text-gray-900">Settings</h1>
          <p className="text-sm text-gray-400 mt-0.5">Configure data sources and credentials</p>
        </div>
        <form onSubmit={save} className="space-y-4">
          <Card className="p-6 space-y-4">
            <h2 className="font-bold text-gray-800">🗄️ Database — Azure Blob</h2>
            <Field label="SAS URL" name="sas_url"
              placeholder="https://marketingoutreach.blob.core.windows.net/365tune-outreach?sp=r…"
              note="Needs Read (sp=r) permission. The dashboard fetches campaign_app.db directly from Azure Blob." />
            <div className="bg-blue-50 border border-blue-100 rounded-xl p-4 text-xs text-blue-800 leading-relaxed">
              <strong>CORS required:</strong> Azure Portal → Storage Account → Resource sharing (CORS) → Blob service → Add rule:
              Allowed origins: <code className="bg-white px-1.5 py-0.5 rounded-lg border border-blue-200">https://liclens.github.io</code>,
              Methods: <code className="bg-white px-1.5 py-0.5 rounded-lg border border-blue-200">GET</code>
            </div>
          </Card>

          <Card className="p-6 space-y-4">
            <h2 className="font-bold text-gray-800">🐙 GitHub</h2>
            <Field label="GitHub PAT" name="github_pat" type="password"
              placeholder="ghp_xxxxxxxxxxxx"
              note="Needs repo + workflow scopes. Used to trigger workflows and manage ICP config." />
            <a href={`https://github.com/${OWNER}/${REPO}/settings/secrets/actions`} target="_blank"
              className="text-xs font-semibold text-blue-600 hover:text-blue-800 transition-colors">
              → Manage GitHub Secrets ↗
            </a>
          </Card>

          <button type="submit"
            className="bg-blue-600 hover:bg-blue-700 text-white font-bold px-6 py-2.5 rounded-xl text-sm transition-colors">
            {saved ? '✅ Saved' : 'Save Settings'}
          </button>
        </form>

        <Card className="p-6">
          <ICPManager pat={form.github_pat} />
        </Card>

        <Card className="p-6">
          <h2 className="font-bold text-gray-800 mb-4">🔐 Change Password</h2>
          <form onSubmit={changePw} className="flex gap-2 items-end">
            <div className="flex-1">
              <label className="text-xs font-bold text-gray-400 uppercase tracking-wide block mb-1.5">New password (min 6 chars)</label>
              <input type="password" value={newPw} onChange={e=>{setNewPw(e.target.value);setPwMsg('');}} className={inputCls} />
            </div>
            <button type="submit" className="bg-gray-800 hover:bg-gray-900 text-white text-sm font-semibold px-5 py-2.5 rounded-xl transition-colors">
              Update
            </button>
          </form>
          {pwMsg && <p className="text-sm mt-2 font-medium text-gray-600">{pwMsg}</p>}
        </Card>
      </div>
    );
  }

  // ── App Root ──────────────────────────────────────────────────────────────
  function App() {
    const [auth, setAuth] = useState(false);
    const [page, setPage] = useState('dashboard');
    const [db, setDb] = useState(null);
    const [loading, setLoading] = useState(false);
    const [loadErr, setLoadErr] = useState('');
    const [settings, setSettings] = useState(loadSettings);

    function handleSaveSettings(s) { saveSettings(s); setSettings(s); }
    function handleLogout() { setAuth(false); setDb(null); }

    async function handleLoadDb() {
      const sas = settings.sas_url;
      if (!sas) { setPage('settings'); setLoadErr('Configure Azure Blob SAS URL in Settings first.'); return; }
      setLoading(true); setLoadErr('');
      try {
        const url = buildBlobUrl(sas);
        const resp = await fetch(url);
        if (!resp.ok) throw new Error(`HTTP ${resp.status} — check SAS URL and Azure CORS settings`);
        const buf = await resp.arrayBuffer();
        const SQL = await initSqlJs({ locateFile: f=>`https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/${f}` });
        setDb(new SQL.Database(new Uint8Array(buf)));
      } catch(e) { setLoadErr(e.message); }
      finally { setLoading(false); }
    }

    if (!auth) return <LoginScreen onLogin={()=>setAuth(true)} />;

    return (
      <div className="flex min-h-screen bg-slate-50">
        <Sidebar page={page} setPage={setPage} dbLoaded={!!db} onLoad={handleLoadDb} loading={loading} onLogout={handleLogout} />
        <main className="flex-1 p-7 overflow-auto min-w-0">
          {loadErr && (
            <div className="mb-5 bg-red-50 border border-red-100 rounded-xl p-4 text-sm text-red-700 font-medium flex justify-between items-start">
              <span>❌ {loadErr}</span>
              <button onClick={()=>setLoadErr('')} className="text-red-300 hover:text-red-500 transition-colors ml-3 shrink-0">✕</button>
            </div>
          )}
          {page==='dashboard' && <DashboardPage db={db} />}
          {page==='prospects' && <ProspectsPage db={db} />}
          {page==='tasks'     && <TasksPage settings={settings} />}
          {page==='settings'  && <SettingsPage settings={settings} onSave={handleSaveSettings} />}
        </main>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
