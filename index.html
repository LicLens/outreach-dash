<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>365TUNE Outreach</title>
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.5/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
  <style>
    .slide-drawer { transform: translateX(100%); transition: transform 0.3s cubic-bezier(.4,0,.2,1); }
    .slide-drawer.open { transform: translateX(0); }
    .nav-item.active { background: rgba(99,102,241,.15); color: #818cf8; border-left: 3px solid #6366f1; }
    pre { white-space: pre-wrap; word-break: break-word; font-family: inherit; }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>
  <script type="text/babel">
  const { useState, useEffect, useRef, useCallback, useMemo } = React;

  // ── Constants ─────────────────────────────────────────────────────────────
  const OWNER = 'LicLens';
  const REPO  = '365tune-outreach';
  const PER_PAGE = 50;
  const LS = { PASS: '365tune_pass_hash', SETTINGS: '365tune_settings' };

  const ICP_COLORS = {
    it_leader: 'bg-blue-100 text-blue-800',
    ciso:      'bg-red-100 text-red-800',
    finops:    'bg-green-100 text-green-800',
    msp:       'bg-purple-100 text-purple-800',
  };
  const ICP_LABELS = { it_leader:'IT Leader', ciso:'CISO', finops:'FinOps', msp:'MSP' };
  const STATUS_COLORS = {
    pending:      'bg-gray-100 text-gray-600',
    researched:   'bg-yellow-100 text-yellow-800',
    emailed:      'bg-green-100 text-green-800',
    bounced:      'bg-red-100 text-red-800',
    unsubscribed: 'bg-orange-100 text-orange-800',
    failed:       'bg-red-100 text-red-700',
  };

  // ── Utilities ─────────────────────────────────────────────────────────────
  async function sha256(msg) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }
  function fmtDate(d) {
    if (!d) return '—';
    try { return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
    catch { return d; }
  }
  function fmtNum(n) { return n == null ? '—' : Number(n).toLocaleString(); }

  function buildBlobUrl(sasUrl) {
    // Reads campaign_app.db — the dashboard snapshot, never the live campaign.db
    if (!sasUrl) return null;
    const idx = sasUrl.indexOf('?');
    return idx === -1 ? sasUrl + '/campaign_app.db' : sasUrl.slice(0,idx) + '/campaign_app.db' + sasUrl.slice(idx);
  }
  function loadSettings() {
    try { return JSON.parse(localStorage.getItem(LS.SETTINGS) || '{}'); } catch { return {}; }
  }
  function saveSettings(s) { localStorage.setItem(LS.SETTINGS, JSON.stringify(s)); }

  // ── GitHub API ────────────────────────────────────────────────────────────
  async function ghFetch(pat, path, method='GET', body=null) {
    const res = await fetch(`https://api.github.com${path}`, {
      method,
      headers: {
        Authorization: `Bearer ${pat}`,
        Accept: 'application/vnd.github+json',
        'Content-Type': 'application/json',
        'X-GitHub-Api-Version': '2022-11-28',
      },
      body: body ? JSON.stringify(body) : null,
    });
    if (method==='DELETE' || res.status===204) return true;
    if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.message||`GitHub ${res.status}`); }
    return res.json();
  }
  async function triggerWorkflow(pat, workflow, inputs={}) {
    return ghFetch(pat, `/repos/${OWNER}/${REPO}/actions/workflows/${workflow}/dispatches`, 'POST', { ref:'main', inputs });
  }
  async function listRuns(pat, workflow) {
    const d = await ghFetch(pat, `/repos/${OWNER}/${REPO}/actions/runs?workflow_id=${workflow}&per_page=6`);
    return d.workflow_runs || [];
  }
  async function getFileContent(pat, path) {
    try {
      const d = await ghFetch(pat, `/repos/${OWNER}/${REPO}/contents/${path}`);
      return { content: JSON.parse(atob(d.content.replace(/\n/g,''))), sha: d.sha };
    } catch { return { content: null, sha: null }; }
  }
  async function setFileContent(pat, path, content, sha, message) {
    return ghFetch(pat, `/repos/${OWNER}/${REPO}/contents/${path}`, 'PUT', {
      message: message || `Update ${path}`,
      content: btoa(unescape(encodeURIComponent(JSON.stringify(content, null, 2)))),
      ...(sha ? { sha } : {}),
    });
  }

  // ── SQL Helpers ───────────────────────────────────────────────────────────
  function dbRun(db, sql, params=[]) {
    if (!db) return [];
    try {
      const stmt = db.prepare(sql); stmt.bind(params);
      const rows = [];
      while (stmt.step()) rows.push(stmt.getAsObject());
      stmt.free(); return rows;
    } catch(e) { console.error('SQL:', e.message, '\n', sql); return []; }
  }
  function dbOne(db, sql, params=[]) { return dbRun(db, sql, params)[0] || null; }

  function getStats(db) {
    const p = dbOne(db,`SELECT COUNT(*) as total,
      SUM(CASE WHEN research_brief IS NOT NULL AND research_brief!='' THEN 1 ELSE 0 END) as researched,
      SUM(CASE WHEN email_sequence IS NOT NULL AND email_sequence!='' THEN 1 ELSE 0 END) as with_emails
      FROM prospects`);
    const s = dbOne(db,`SELECT
      SUM(CASE WHEN status='sent' THEN 1 ELSE 0 END) as sent,
      SUM(CASE WHEN status='scheduled' THEN 1 ELSE 0 END) as scheduled,
      SUM(CASE WHEN status='failed' THEN 1 ELSE 0 END) as failed
      FROM email_sends`);
    const icp = dbRun(db,`SELECT COALESCE(icp,'it_leader') as icp, COUNT(*) as cnt
      FROM prospects GROUP BY icp ORDER BY cnt DESC`);
    return { ...p, ...s, icp };
  }
  function getDailySends(db) {
    return dbRun(db,`SELECT DATE(sent_at) as date, COUNT(*) as count FROM email_sends
      WHERE status='sent' AND sent_at IS NOT NULL
      GROUP BY DATE(sent_at) ORDER BY date DESC LIMIT 30`).reverse();
  }
  function getProspects(db, page, search, icpF, statusF) {
    const like = `%${search}%`;
    const w = `WHERE (? = '' OR p.first_name LIKE ? OR p.last_name LIKE ? OR p.company LIKE ? OR p.email LIKE ?)
      AND (? = '' OR COALESCE(p.icp,'it_leader') = ?)
      AND (? = '' OR p.status = ?)`;
    const params = [search,like,like,like,like, icpF,icpF, statusF,statusF];
    const cnt = dbOne(db,`SELECT COUNT(DISTINCT p.id) as total FROM prospects p ${w}`, params);
    const rows = dbRun(db,`SELECT p.id, p.first_name, p.last_name, p.title, p.company, p.email,
      p.employees, COALESCE(p.icp,'it_leader') as icp, p.status, p.error_msg,
      p.research_brief, p.email_sequence,
      COUNT(CASE WHEN es.status='sent' THEN 1 END) as emails_sent,
      MAX(CASE WHEN es.status='sent' THEN es.sent_at END) as last_sent_at,
      MIN(CASE WHEN es.status='scheduled' THEN es.scheduled_date END) as next_send
      FROM prospects p LEFT JOIN email_sends es ON es.prospect_id=p.id
      ${w} GROUP BY p.id ORDER BY p.id LIMIT ? OFFSET ?`,
      [...params, PER_PAGE, page*PER_PAGE]);
    return { total: cnt?.total||0, rows };
  }

  // ── Shared Components ─────────────────────────────────────────────────────
  function Badge({ label, cls }) {
    return <span className={`px-2 py-0.5 rounded-full text-xs font-medium ${cls}`}>{label}</span>;
  }
  function EmptyState({ icon, title, sub }) {
    return (
      <div className="flex flex-col items-center justify-center h-64 text-gray-400">
        <div className="text-5xl mb-3">{icon}</div>
        <div className="text-base font-medium text-gray-500">{title}</div>
        {sub && <div className="text-sm mt-1">{sub}</div>}
      </div>
    );
  }

  // ── Login ─────────────────────────────────────────────────────────────────
  function LoginScreen({ onLogin }) {
    const [pw, setPw] = useState('');
    const [err, setErr] = useState('');
    const hasPass = !!localStorage.getItem(LS.PASS);

    async function handle(e) {
      e.preventDefault();
      if (!hasPass && pw.length < 6) { setErr('Min 6 characters'); return; }
      const hash = await sha256(pw);
      if (!hasPass) { localStorage.setItem(LS.PASS, hash); onLogin(); return; }
      if (hash === localStorage.getItem(LS.PASS)) { onLogin(); }
      else { setErr('Incorrect password'); }
    }

    return (
      <div className="min-h-screen flex items-center justify-center bg-slate-900">
        <div className="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-sm">
          <div className="text-center mb-7">
            <div className="text-3xl font-bold text-indigo-600 tracking-tight">365TUNE</div>
            <div className="text-sm text-gray-400 mt-1">Outreach Dashboard</div>
          </div>
          <form onSubmit={handle} className="space-y-4">
            <div>
              <label className="text-xs font-medium text-gray-600 block mb-1">
                {hasPass ? 'Password' : 'Set a dashboard password'}
              </label>
              <input type="password" value={pw} onChange={e=>{setPw(e.target.value);setErr('');}}
                className="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                placeholder={hasPass ? 'Enter password' : 'Min 6 characters'} autoFocus />
            </div>
            {err && <p className="text-red-500 text-xs">{err}</p>}
            <button type="submit"
              className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 rounded-lg text-sm transition">
              {hasPass ? 'Sign In' : 'Get Started'}
            </button>
          </form>
        </div>
      </div>
    );
  }

  // ── Sidebar ───────────────────────────────────────────────────────────────
  function NavItem({ icon, label, active, onClick }) {
    return (
      <button onClick={onClick}
        className={`nav-item flex items-center gap-3 w-full px-4 py-2.5 text-sm font-medium rounded-r-lg transition mb-0.5 text-left ${active?'active':'text-slate-400 hover:bg-slate-700/50 hover:text-white'}`}>
        <span>{icon}</span><span>{label}</span>
      </button>
    );
  }
  function Sidebar({ page, setPage, dbLoaded, onLoad, loading, onLogout }) {
    return (
      <div className="w-56 min-h-screen bg-slate-900 flex flex-col shrink-0">
        <div className="px-5 py-5 border-b border-slate-700/50">
          <div className="text-lg font-bold text-white tracking-tight">365TUNE</div>
          <div className="text-xs text-slate-500 mt-0.5">Outreach Platform</div>
        </div>
        <div className="flex-1 py-3 pr-2">
          <NavItem icon="📊" label="Dashboard"  active={page==='dashboard'} onClick={()=>setPage('dashboard')} />
          <NavItem icon="👥" label="Prospects"  active={page==='prospects'} onClick={()=>setPage('prospects')} />
          <NavItem icon="⚡" label="Tasks"      active={page==='tasks'}     onClick={()=>setPage('tasks')} />
          <NavItem icon="⚙️" label="Settings"  active={page==='settings'}  onClick={()=>setPage('settings')} />
        </div>
        <div className="p-3 border-t border-slate-700/50 space-y-2">
          <button onClick={onLoad} disabled={loading}
            className={`w-full flex items-center justify-center gap-2 py-2 rounded-lg text-xs font-medium transition
              ${loading ? 'bg-slate-700 text-slate-400 cursor-not-allowed' : 'bg-indigo-600 hover:bg-indigo-500 text-white'}`}>
            {loading ? '⏳ Loading…' : dbLoaded ? '🔄 Refresh Data' : '📥 Load Data'}
          </button>
          {dbLoaded && <p className="text-center text-xs text-emerald-400">✓ DB loaded</p>}
          <button onClick={onLogout} className="w-full text-xs text-slate-600 hover:text-slate-400 transition py-1">Sign out</button>
        </div>
      </div>
    );
  }

  // ── Dashboard ─────────────────────────────────────────────────────────────
  function StatCard({ label, value, color='indigo' }) {
    const map = {
      indigo:'border-l-indigo-500 bg-indigo-50', green:'border-l-green-500 bg-green-50',
      blue:'border-l-blue-500 bg-blue-50', orange:'border-l-orange-500 bg-orange-50',
      red:'border-l-red-500 bg-red-50', purple:'border-l-purple-500 bg-purple-50',
    };
    return (
      <div className={`rounded-xl border-l-4 p-4 ${map[color]}`}>
        <div className="text-2xl font-bold text-gray-800">{fmtNum(value)}</div>
        <div className="text-sm text-gray-500 mt-0.5">{label}</div>
      </div>
    );
  }
  function BarChart({ data }) {
    const ref = useRef(); const chart = useRef();
    useEffect(() => {
      if (!ref.current || !data?.length) return;
      chart.current?.destroy();
      chart.current = new Chart(ref.current, {
        type: 'bar',
        data: {
          labels: data.map(d => { try { return new Date(d.date+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}); } catch { return d.date; }}),
          datasets: [{ label:'Sent', data: data.map(d=>d.count), backgroundColor:'rgba(99,102,241,0.75)', borderRadius:4 }],
        },
        options: { responsive:true, plugins:{legend:{display:false}}, scales:{ y:{beginAtZero:true, grid:{color:'rgba(0,0,0,0.05)'}}, x:{grid:{display:false}} } },
      });
      return () => chart.current?.destroy();
    }, [data]);
    if (!data?.length) return <div className="text-gray-400 text-sm text-center py-8">No send history yet</div>;
    return <canvas ref={ref} />;
  }
  function DashboardPage({ db }) {
    if (!db) return <EmptyState icon="📥" title="No data loaded" sub='Click "Load Data" in the sidebar' />;
    const stats = useMemo(()=>getStats(db),[db]);
    const daily = useMemo(()=>getDailySends(db),[db]);
    return (
      <div className="space-y-6">
        <h1 className="text-xl font-semibold text-gray-800">Dashboard</h1>
        <div className="grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-6 gap-3">
          <StatCard label="Total Prospects" value={stats.total}      color="blue" />
          <StatCard label="Researched"       value={stats.researched} color="indigo" />
          <StatCard label="Email Sequences"  value={stats.with_emails} color="purple" />
          <StatCard label="Emails Sent"      value={stats.sent}       color="green" />
          <StatCard label="Scheduled"        value={stats.scheduled}  color="orange" />
          <StatCard label="Failed"           value={stats.failed}     color="red" />
        </div>
        <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
          <div className="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
            <h2 className="text-sm font-semibold text-gray-700 mb-4">Prospects by ICP</h2>
            <div className="space-y-2">
              {stats.icp?.map(r => (
                <div key={r.icp} className="flex items-center justify-between">
                  <Badge label={ICP_LABELS[r.icp]||r.icp} cls={ICP_COLORS[r.icp]||'bg-gray-100 text-gray-700'} />
                  <span className="text-sm font-semibold text-gray-700">{fmtNum(r.cnt)}</span>
                </div>
              ))}
            </div>
          </div>
          <div className="lg:col-span-2 bg-white rounded-xl p-5 shadow-sm border border-gray-100">
            <h2 className="text-sm font-semibold text-gray-700 mb-4">Daily Sends — last 30 days</h2>
            <BarChart data={daily} />
          </div>
        </div>
      </div>
    );
  }

  // ── Prospect Drawer ───────────────────────────────────────────────────────
  function EmailCard({ email, num }) {
    const [open, setOpen] = useState(false);
    return (
      <div className="border rounded-lg overflow-hidden">
        <button onClick={()=>setOpen(!open)}
          className="w-full flex items-center justify-between px-4 py-3 bg-gray-50 hover:bg-gray-100 transition text-left">
          <div className="flex items-center gap-2 min-w-0">
            <span className="text-xs font-bold text-indigo-600 shrink-0">#{num}</span>
            <span className="text-sm font-medium text-gray-800 truncate">{email.subject}</span>
            {email.day != null && <span className="text-xs text-gray-400 shrink-0">Day {email.day}</span>}
          </div>
          <span className="text-gray-400 ml-2 shrink-0">{open?'▲':'▼'}</span>
        </button>
        {open && (
          <div className="px-4 py-3 space-y-2">
            {email.preview && <div className="text-xs text-gray-400 italic border-l-2 border-gray-200 pl-2">{email.preview}</div>}
            <pre className="text-sm text-gray-700 leading-relaxed">{email.body}</pre>
          </div>
        )}
      </div>
    );
  }
  function ProspectDrawer({ prospect, onClose }) {
    const [tab, setTab] = useState('brief');
    const open = !!prospect;
    let seq = [];
    try { if (prospect?.email_sequence) seq = JSON.parse(prospect.email_sequence); } catch {}

    useEffect(() => { if (prospect) setTab('brief'); }, [prospect?.id]);

    return (
      <>
        {open && <div className="fixed inset-0 bg-black/30 z-20" onClick={onClose} />}
        <div className={`slide-drawer fixed top-0 right-0 h-full w-full max-w-2xl bg-white shadow-2xl z-30 flex flex-col ${open?'open':''}`}>
          {prospect && <>
            <div className="px-6 py-4 border-b">
              <div className="flex items-start justify-between">
                <div className="min-w-0">
                  <div className="font-semibold text-gray-900 text-base">{prospect.first_name} {prospect.last_name}</div>
                  <div className="text-sm text-gray-500 truncate">{prospect.title}{prospect.company ? ` · ${prospect.company}` : ''}</div>
                  <div className="flex flex-wrap gap-1.5 mt-1.5">
                    <Badge label={ICP_LABELS[prospect.icp]||prospect.icp} cls={ICP_COLORS[prospect.icp]||'bg-gray-100 text-gray-700'} />
                    <Badge label={prospect.status||'pending'} cls={STATUS_COLORS[prospect.status]||STATUS_COLORS.pending} />
                    {prospect.emails_sent > 0 && <Badge label={`${prospect.emails_sent} sent`} cls="bg-green-100 text-green-700" />}
                    {prospect.employees && <Badge label={`${fmtNum(prospect.employees)} employees`} cls="bg-gray-100 text-gray-600" />}
                  </div>
                </div>
                <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-xl ml-4 shrink-0">✕</button>
              </div>
              {prospect.email && <div className="text-xs text-gray-400 mt-2">{prospect.email}</div>}
            </div>
            <div className="flex border-b px-6">
              {[['brief','📋 AI Brief'],['emails',`✉️ Emails (${seq.length})`]].map(([t,l]) => (
                <button key={t} onClick={()=>setTab(t)}
                  className={`py-3 px-4 text-sm font-medium border-b-2 transition ${tab===t?'border-indigo-600 text-indigo-600':'border-transparent text-gray-500 hover:text-gray-700'}`}>
                  {l}
                </button>
              ))}
            </div>
            <div className="flex-1 overflow-y-auto p-6">
              {tab==='brief' && (
                prospect.research_brief
                  ? <pre className="text-sm text-gray-700 leading-relaxed bg-slate-50 rounded-lg p-4 border text-sm">{prospect.research_brief}</pre>
                  : <div className="text-gray-400 text-sm">No research brief generated yet.</div>
              )}
              {tab==='emails' && (
                <div className="space-y-2">
                  {seq.length===0
                    ? <div className="text-gray-400 text-sm">No email sequence generated yet.</div>
                    : seq.map((em,i) => <EmailCard key={i} email={em} num={i+1} />)}
                </div>
              )}
            </div>
          </>}
        </div>
      </>
    );
  }

  // ── Prospects Table ───────────────────────────────────────────────────────
  function ProspectsPage({ db }) {
    const [page, setPage] = useState(0);
    const [search, setSearch] = useState('');
    const [icpF, setIcpF] = useState('');
    const [statusF, setStatusF] = useState('');
    const [debSearch, setDebSearch] = useState('');
    const [selected, setSelected] = useState(null);

    useEffect(() => {
      const t = setTimeout(()=>{ setDebSearch(search); setPage(0); }, 300);
      return ()=>clearTimeout(t);
    }, [search]);
    useEffect(()=>setPage(0), [icpF, statusF]);

    const { total, rows } = useMemo(()=>{
      if (!db) return { total:0, rows:[] };
      return getProspects(db, page, debSearch, icpF, statusF);
    }, [db, page, debSearch, icpF, statusF]);

    const totalPages = Math.ceil(total/PER_PAGE);
    if (!db) return <EmptyState icon="👥" title="Load DB to view prospects" />;

    return (
      <div className="space-y-4">
        <div className="flex items-center justify-between">
          <h1 className="text-xl font-semibold text-gray-800">
            Prospects <span className="text-gray-400 font-normal text-base">({fmtNum(total)})</span>
          </h1>
        </div>
        {/* Filters */}
        <div className="flex flex-wrap gap-2 items-center">
          <input value={search} onChange={e=>setSearch(e.target.value)}
            placeholder="Search name, company, email…"
            className="border border-gray-300 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 w-72" />
          <select value={icpF} onChange={e=>setIcpF(e.target.value)}
            className="border border-gray-300 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
            <option value="">All ICPs</option>
            {Object.entries(ICP_LABELS).map(([k,v])=><option key={k} value={k}>{v}</option>)}
          </select>
          <select value={statusF} onChange={e=>setStatusF(e.target.value)}
            className="border border-gray-300 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
            <option value="">All Statuses</option>
            {['pending','researched','emailed','bounced','unsubscribed','failed'].map(s=>(
              <option key={s} value={s}>{s.charAt(0).toUpperCase()+s.slice(1)}</option>
            ))}
          </select>
          {(search||icpF||statusF) && (
            <button onClick={()=>{ setSearch(''); setIcpF(''); setStatusF(''); }}
              className="text-xs text-indigo-600 hover:underline">Clear filters</button>
          )}
        </div>
        {/* Table */}
        <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead>
                <tr className="bg-gray-50 text-left text-xs font-semibold text-gray-500 uppercase tracking-wide border-b">
                  <th className="px-4 py-3">Name</th>
                  <th className="px-4 py-3">Company</th>
                  <th className="px-4 py-3">Title</th>
                  <th className="px-4 py-3">ICP</th>
                  <th className="px-4 py-3">Status</th>
                  <th className="px-4 py-3">Sent</th>
                  <th className="px-4 py-3">Next Send</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-gray-50">
                {rows.map(p=>(
                  <tr key={p.id} onClick={()=>setSelected(p)}
                    className="hover:bg-indigo-50/50 cursor-pointer transition">
                    <td className="px-4 py-3 font-medium text-gray-900">{p.first_name} {p.last_name}</td>
                    <td className="px-4 py-3 text-gray-600">{p.company||'—'}</td>
                    <td className="px-4 py-3 text-gray-500 max-w-xs truncate">{p.title||'—'}</td>
                    <td className="px-4 py-3"><Badge label={ICP_LABELS[p.icp]||p.icp} cls={ICP_COLORS[p.icp]||'bg-gray-100 text-gray-700'} /></td>
                    <td className="px-4 py-3"><Badge label={p.status||'pending'} cls={STATUS_COLORS[p.status]||STATUS_COLORS.pending} /></td>
                    <td className="px-4 py-3 text-gray-500">{p.emails_sent||0}</td>
                    <td className="px-4 py-3 text-gray-400 text-xs">{p.next_send||'—'}</td>
                  </tr>
                ))}
                {rows.length===0 && (
                  <tr><td colSpan="7" className="px-4 py-10 text-center text-gray-400">No prospects match your filters</td></tr>
                )}
              </tbody>
            </table>
          </div>
          {totalPages > 1 && (
            <div className="flex items-center justify-between px-4 py-3 border-t bg-gray-50">
              <span className="text-xs text-gray-500">
                {page*PER_PAGE+1}–{Math.min((page+1)*PER_PAGE,total)} of {fmtNum(total)}
              </span>
              <div className="flex gap-1">
                {[['«',0],['‹',Math.max(0,page-1)]].map(([l,p])=>(
                  <button key={l} onClick={()=>setPage(p)} disabled={page===0}
                    className="px-2 py-1 text-xs rounded border disabled:opacity-40 hover:bg-gray-100">{l}</button>
                ))}
                <span className="px-3 py-1 text-xs text-gray-600">Page {page+1} / {totalPages}</span>
                {[['›',Math.min(totalPages-1,page+1)],['»',totalPages-1]].map(([l,p])=>(
                  <button key={l} onClick={()=>setPage(p)} disabled={page>=totalPages-1}
                    className="px-2 py-1 text-xs rounded border disabled:opacity-40 hover:bg-gray-100">{l}</button>
                ))}
              </div>
            </div>
          )}
        </div>
        <ProspectDrawer prospect={selected} onClose={()=>setSelected(null)} />
      </div>
    );
  }

  // ── Tasks ─────────────────────────────────────────────────────────────────
  function WorkflowCard({ icon, title, desc, workflow, fields=[], pat }) {
    const [inputs, setInputs] = useState(()=>Object.fromEntries((fields||[]).map(f=>[f.name,f.default||''])));
    const [loading, setLoading] = useState(false);
    const [runs, setRuns] = useState([]);
    const [msg, setMsg] = useState('');

    const loadRuns = useCallback(async()=>{
      if (!pat) return;
      try { setRuns(await listRuns(pat, workflow)); } catch {}
    },[pat, workflow]);

    useEffect(()=>{ loadRuns(); },[loadRuns]);

    async function run() {
      if (!pat) { setMsg('❌ Add GitHub PAT in Settings'); return; }
      setLoading(true); setMsg('');
      try {
        await triggerWorkflow(pat, workflow, inputs);
        setMsg('✅ Workflow triggered! Refresh in a few seconds.');
        setTimeout(loadRuns, 4000);
      } catch(e) { setMsg(`❌ ${e.message}`); }
      finally { setLoading(false); }
    }

    const icons = { completed:'✅', failure:'❌', in_progress:'⏳', queued:'🕐', cancelled:'⛔', skipped:'⏭️' };

    return (
      <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-5 flex flex-col">
        <div className="flex gap-3 mb-3">
          <span className="text-2xl">{icon}</span>
          <div><div className="font-semibold text-gray-800">{title}</div><div className="text-xs text-gray-400">{desc}</div></div>
        </div>
        {fields.map(f=>(
          <div key={f.name} className="mb-2">
            <label className="text-xs text-gray-500 block mb-1">{f.label}</label>
            {f.type==='select'
              ? <select value={inputs[f.name]||''} onChange={e=>setInputs(i=>({...i,[f.name]:e.target.value}))}
                  className="w-full border rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                  {f.options.map(o=><option key={o} value={o}>{o}</option>)}
                </select>
              : <input type={f.inputType||'text'} value={inputs[f.name]||''} onChange={e=>setInputs(i=>({...i,[f.name]:e.target.value}))}
                  placeholder={f.placeholder}
                  className="w-full border rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
            }
          </div>
        ))}
        <button onClick={run} disabled={loading}
          className="mt-auto w-full bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 text-white text-sm font-medium py-2 rounded-lg transition mt-3">
          {loading ? '⏳ Triggering…' : '▶ Run Now'}
        </button>
        {msg && <div className="mt-2 text-xs text-gray-500">{msg}</div>}
        {runs.length>0 && (
          <div className="mt-3 pt-3 border-t space-y-1">
            <div className="text-xs font-semibold text-gray-400 mb-1.5">Recent runs</div>
            {runs.slice(0,4).map(r=>(
              <div key={r.id} className="flex justify-between text-xs text-gray-500">
                <span>{icons[r.conclusion||r.status]||'🔵'} {r.conclusion||r.status}</span>
                <span className="text-gray-400">{fmtDate(r.created_at)}</span>
              </div>
            ))}
          </div>
        )}
      </div>
    );
  }
  function TasksPage({ settings }) {
    const pat = settings.github_pat;
    return (
      <div className="space-y-4">
        <h1 className="text-xl font-semibold text-gray-800">Tasks</h1>
        {!pat && (
          <div className="bg-amber-50 border border-amber-200 rounded-lg p-3 text-sm text-amber-800">
            ⚠️ Configure your GitHub PAT in Settings to trigger workflows.
          </div>
        )}
        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
          <WorkflowCard icon="📧" title="Send Emails" desc="Run the scheduled email send" workflow="outreach.yml" pat={pat} />
          <WorkflowCard icon="🔬" title="Process Prospects" desc="Research prospects and generate email sequences"
            workflow="process.yml" pat={pat}
            fields={[{name:'batch',label:'Batch size',inputType:'number',default:'500',placeholder:'e.g. 500'}]} />
          <WorkflowCard icon="🔁" title="Retry Failed" desc="Retry prospects with failed research or email gen"
            workflow="retry.yml" pat={pat}
            fields={[
              {name:'mode',label:'Mode',type:'select',default:'all',options:['all','research','emailgen']},
              {name:'batch',label:'Batch size',inputType:'number',default:'100',placeholder:'100'},
              {name:'filter',label:'Error filter (optional)',placeholder:'e.g. anthropic'},
            ]} />
          <WorkflowCard icon="📊" title="Update Dashboard" desc="Refresh GitHub Pages with latest data" workflow="dashboard.yml" pat={pat} />
        </div>
      </div>
    );
  }

  // ── ICP Manager ───────────────────────────────────────────────────────────
  const DEFAULT_ICPS = [
    { id:'it_leader', label:'IT Leader',  keywords:['it director','cto','vp of it','head of it','it manager'],         description:'IT decision makers responsible for M365 licensing' },
    { id:'ciso',      label:'CISO',       keywords:['ciso','chief information security','security director'],            description:'Security leaders focused on compliance and risk' },
    { id:'finops',    label:'FinOps',     keywords:['finops','cloud cost','cost optimization','cloud spend'],            description:'Finance/ops leaders managing cloud costs' },
    { id:'msp',       label:'MSP',        keywords:['msp','managed service','service delivery','channel manager'],       description:'Managed service providers reselling M365' },
  ];
  const BLANK_FORM = { id:'', label:'', keywords:'', description:'', research_prompt:'', email_prompt:'' };

  function ICPManager({ pat }) {
    const [icps, setIcps] = useState(DEFAULT_ICPS);
    const [sha, setSha] = useState(null);
    const [adding, setAdding] = useState(false);
    const [form, setForm] = useState(BLANK_FORM);
    const [saving, setSaving] = useState(false);
    const [msg, setMsg] = useState('');

    useEffect(()=>{
      if (!pat) return;
      getFileContent(pat,'outreach_automation/icp_config.json').then(({content,sha})=>{
        if (content && Array.isArray(content)) { setIcps(content); setSha(sha); }
      });
    },[pat]);

    async function save(updated) {
      if (!pat) { setMsg('❌ GitHub PAT required'); return; }
      setSaving(true); setMsg('');
      try {
        const res = await setFileContent(pat,'outreach_automation/icp_config.json', updated, sha,'Update ICP configuration');
        setIcps(updated);
        if (res?.content?.sha) setSha(res.content.sha);
        setMsg('✅ Saved to GitHub');
        setTimeout(()=>setMsg(''),3000);
      } catch(e) { setMsg(`❌ ${e.message}`); }
      finally { setSaving(false); }
    }

    function add() {
      if (!form.id||!form.label) { setMsg('ID and Label are required'); return; }
      save([...icps,{
        id: form.id.toLowerCase().replace(/\s+/g,'_'),
        label: form.label,
        keywords: form.keywords.split(',').map(k=>k.trim()).filter(Boolean),
        description: form.description,
        research_prompt: form.research_prompt,
        email_prompt: form.email_prompt,
      }]);
      setForm(BLANK_FORM); setAdding(false);
    }

    return (
      <div>
        <div className="flex items-center justify-between mb-4">
          <div><h3 className="font-semibold text-gray-800">ICP Management</h3>
            <p className="text-xs text-gray-400 mt-0.5">Saved to <code>icp_config.json</code> in GitHub repo</p>
          </div>
          <button onClick={()=>setAdding(!adding)}
            className="text-sm bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-1.5 rounded-lg transition">
            + Add ICP
          </button>
        </div>
        {msg && <div className="mb-3 text-sm text-gray-600">{msg}</div>}
        <div className="space-y-2 mb-4">
          {icps.map(icp=>(
            <div key={icp.id} className="flex items-start justify-between bg-gray-50 rounded-lg px-4 py-3 border border-gray-100">
              <div className="min-w-0">
                <div className="flex items-center gap-2">
                  <span className="font-medium text-gray-800 text-sm">{icp.label}</span>
                  <code className="text-xs text-gray-400 bg-white px-1.5 py-0.5 rounded border">{icp.id}</code>
                </div>
                {icp.description && <p className="text-xs text-gray-500 mt-0.5">{icp.description}</p>}
                {icp.keywords?.length>0 && (
                  <div className="flex flex-wrap gap-1 mt-1.5">
                    {icp.keywords.slice(0,6).map(k=>(
                      <span key={k} className="text-xs bg-white border text-gray-500 px-1.5 py-0.5 rounded">{k}</span>
                    ))}
                    {icp.keywords.length>6 && <span className="text-xs text-gray-400">+{icp.keywords.length-6}</span>}
                  </div>
                )}
              </div>
              <button onClick={()=>{ if(confirm(`Delete "${icp.label}"?`)) save(icps.filter(i=>i.id!==icp.id)); }}
                className="text-xs text-red-400 hover:text-red-600 ml-3 shrink-0">Delete</button>
            </div>
          ))}
        </div>
        {adding && (
          <div className="border rounded-xl p-4 bg-gray-50 space-y-3">
            <h4 className="text-sm font-semibold text-gray-700">New ICP</h4>
            <div className="grid grid-cols-2 gap-3">
              {[['ID (snake_case)','id','e.g. it_director'],['Display Label','label','e.g. IT Director']].map(([l,n,p])=>(
                <div key={n}>
                  <label className="text-xs text-gray-500 block mb-1">{l}</label>
                  <input value={form[n]} onChange={e=>setForm(f=>({...f,[n]:e.target.value}))} placeholder={p}
                    className="w-full border rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
                </div>
              ))}
            </div>
            <div>
              <label className="text-xs text-gray-500 block mb-1">Keywords (comma-separated)</label>
              <input value={form.keywords} onChange={e=>setForm(f=>({...f,keywords:e.target.value}))} placeholder="it director, vp of it, head of it"
                className="w-full border rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
            </div>
            <div>
              <label className="text-xs text-gray-500 block mb-1">Description</label>
              <input value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))} placeholder="Short description"
                className="w-full border rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
            </div>
            {[['Research Prompt (optional)','research_prompt'],['Email Sequence Prompt (optional)','email_prompt']].map(([l,n])=>(
              <div key={n}>
                <label className="text-xs text-gray-500 block mb-1">{l}</label>
                <textarea value={form[n]} onChange={e=>setForm(f=>({...f,[n]:e.target.value}))} rows={3}
                  className="w-full border rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none" />
              </div>
            ))}
            <div className="flex gap-2">
              <button onClick={add} disabled={saving}
                className="bg-indigo-600 hover:bg-indigo-700 text-white text-sm px-4 py-2 rounded-lg transition disabled:opacity-50">
                {saving?'Saving…':'Save ICP'}
              </button>
              <button onClick={()=>{setAdding(false);setForm(BLANK_FORM);}}
                className="border text-gray-600 text-sm px-4 py-2 rounded-lg hover:bg-white transition">Cancel</button>
            </div>
          </div>
        )}
      </div>
    );
  }

  // ── Settings ──────────────────────────────────────────────────────────────
  function SettingsPage({ settings, onSave }) {
    const [form, setForm] = useState({ sas_url:'', github_pat:'', anthropic_key:'', ms_tenant_id:'', ms_client_id:'', ms_client_secret:'', ...settings });
    const [saved, setSaved] = useState(false);
    const [newPw, setNewPw] = useState('');
    const [pwMsg, setPwMsg] = useState('');

    function Field({ label, name, type='text', placeholder='', note='' }) {
      return (
        <div>
          <label className="text-xs font-medium text-gray-600 block mb-1">{label}</label>
          <input type={type} value={form[name]||''} onChange={e=>setForm(f=>({...f,[name]:e.target.value}))}
            placeholder={placeholder}
            className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
          {note && <p className="text-xs text-gray-400 mt-0.5">{note}</p>}
        </div>
      );
    }

    function save(e) {
      e.preventDefault(); onSave(form); setSaved(true); setTimeout(()=>setSaved(false),2500);
    }
    async function changePw(e) {
      e.preventDefault();
      if (newPw.length<6) { setPwMsg('Min 6 characters'); return; }
      localStorage.setItem(LS.PASS, await sha256(newPw));
      setNewPw(''); setPwMsg('✅ Password updated'); setTimeout(()=>setPwMsg(''),3000);
    }

    return (
      <div className="max-w-2xl space-y-5">
        <h1 className="text-xl font-semibold text-gray-800">Settings</h1>
        <form onSubmit={save} className="space-y-4">

          <section className="bg-white rounded-xl p-5 shadow-sm border border-gray-100 space-y-3">
            <h2 className="font-semibold text-gray-700">🗄️ Database — Azure Blob</h2>
            <Field label="SAS URL" name="sas_url"
              placeholder="https://marketingoutreach.blob.core.windows.net/365tune-outreach?sp=r…"
              note="Needs Read (sp=r) permission. The app fetches campaign.db directly from Azure Blob." />
            <div className="bg-blue-50 border border-blue-200 rounded-lg p-3 text-xs text-blue-800 leading-relaxed">
              <strong>CORS required:</strong> Azure Portal → Storage Account → Resource sharing (CORS) → Blob service → Add rule:
              Allowed origins: <code className="bg-white px-1 rounded">https://liclens.github.io</code>,
              Methods: <code className="bg-white px-1 rounded">GET</code>, Headers: <code className="bg-white px-1 rounded">*</code>
            </div>
          </section>

          <section className="bg-white rounded-xl p-5 shadow-sm border border-gray-100 space-y-3">
            <h2 className="font-semibold text-gray-700">🐙 GitHub</h2>
            <Field label="GitHub PAT" name="github_pat" type="password"
              placeholder="ghp_xxxxxxxxxxxx"
              note="Needs repo + workflow scopes. Used to trigger workflows and manage ICP config." />
          </section>

          <section className="bg-white rounded-xl p-5 shadow-sm border border-gray-100 space-y-3">
            <h2 className="font-semibold text-gray-700">🔑 API Keys</h2>
            <p className="text-xs text-gray-400">Stored in your browser. Use the link below to update GitHub Secrets.</p>
            <Field label="Anthropic API Key" name="anthropic_key" type="password" placeholder="sk-ant-…" />
            <Field label="Microsoft Tenant ID" name="ms_tenant_id" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" />
            <Field label="Microsoft Client ID" name="ms_client_id" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" />
            <Field label="Microsoft Client Secret" name="ms_client_secret" type="password" placeholder="••••••••" />
            <a href={`https://github.com/${OWNER}/${REPO}/settings/secrets/actions`} target="_blank"
              className="text-xs text-indigo-600 hover:underline">→ Manage GitHub Secrets directly ↗</a>
          </section>

          <button type="submit"
            className="bg-indigo-600 hover:bg-indigo-700 text-white font-medium px-6 py-2.5 rounded-lg text-sm transition">
            {saved ? '✅ Saved' : 'Save Settings'}
          </button>
        </form>

        <section className="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
          <ICPManager pat={form.github_pat} />
        </section>

        <section className="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
          <h2 className="font-semibold text-gray-700 mb-3">🔐 Change Password</h2>
          <form onSubmit={changePw} className="flex gap-2 items-end">
            <div className="flex-1">
              <label className="text-xs text-gray-500 block mb-1">New password (min 6 chars)</label>
              <input type="password" value={newPw} onChange={e=>{setNewPw(e.target.value);setPwMsg('');}}
                className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
            </div>
            <button type="submit" className="bg-gray-700 hover:bg-gray-900 text-white text-sm px-4 py-2 rounded-lg transition">Update</button>
          </form>
          {pwMsg && <p className="text-sm mt-2 text-gray-600">{pwMsg}</p>}
        </section>
      </div>
    );
  }

  // ── App Root ──────────────────────────────────────────────────────────────
  function App() {
    const [auth, setAuth] = useState(false);
    const [page, setPage] = useState('dashboard');
    const [db, setDb] = useState(null);
    const [loading, setLoading] = useState(false);
    const [loadErr, setLoadErr] = useState('');
    const [settings, setSettings] = useState(loadSettings);

    function handleSaveSettings(s) { saveSettings(s); setSettings(s); }
    function handleLogout() { setAuth(false); setDb(null); }

    async function handleLoadDb() {
      const sas = settings.sas_url;
      if (!sas) { setPage('settings'); setLoadErr('Configure Azure Blob SAS URL in Settings first.'); return; }
      setLoading(true); setLoadErr('');
      try {
        const url = buildBlobUrl(sas);
        const resp = await fetch(url);
        if (!resp.ok) throw new Error(`HTTP ${resp.status} — check SAS URL and Azure CORS settings`);
        const buf = await resp.arrayBuffer();
        const SQL = await initSqlJs({ locateFile: f=>`https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/${f}` });
        setDb(new SQL.Database(new Uint8Array(buf)));
      } catch(e) { setLoadErr(e.message); }
      finally { setLoading(false); }
    }

    if (!auth) return <LoginScreen onLogin={()=>setAuth(true)} />;

    return (
      <div className="flex min-h-screen">
        <Sidebar page={page} setPage={setPage} dbLoaded={!!db} onLoad={handleLoadDb} loading={loading} onLogout={handleLogout} />
        <main className="flex-1 p-6 overflow-auto min-w-0">
          {loadErr && (
            <div className="mb-4 bg-red-50 border border-red-200 rounded-lg p-3 text-sm text-red-700 flex justify-between">
              <span>❌ {loadErr}</span>
              <button onClick={()=>setLoadErr('')} className="text-red-400 hover:text-red-600 ml-2">✕</button>
            </div>
          )}
          {page==='dashboard' && <DashboardPage db={db} />}
          {page==='prospects' && <ProspectsPage db={db} />}
          {page==='tasks'     && <TasksPage settings={settings} />}
          {page==='settings'  && <SettingsPage settings={settings} onSave={handleSaveSettings} />}
        </main>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
